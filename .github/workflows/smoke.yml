name:
API Smoke Tests


on:

 pull_request:


jobs:


 test:


  runs-on:
    ubuntu-latest



  steps:


  - name:
      Checkout

    uses:
      actions/checkout@v4



  - name:
      Setup Java

    uses:
      actions/setup-java@v4

    with:

      java-version:
        21



  - name:
      Run tests


    run:

      mvn clean test \
      -Ptest \
      -Dgroups=smoke



  - name:
      Upload Allure Results


    uses:
      actions/upload-artifact@v4


    with:

      name:
        allure-results


      path:

        target/allure-results