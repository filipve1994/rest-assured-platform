# Enables parallel test execution. Safe default here: dynamic strategy sizes
# the thread pool to available processors. Tests that share mutable state
# must be annotated @Execution(SAME_THREAD) or @ResourceLock to opt out.
junit.jupiter.execution.parallel.enabled = true
junit.jupiter.execution.parallel.mode.default = concurrent
junit.jupiter.execution.parallel.mode.classes.default = concurrent
junit.jupiter.execution.parallel.config.strategy = dynamic
junit.jupiter.execution.parallel.config.dynamic.factor = 1.0

# Deterministic ordering is JUnit 6's new default for @Nested classes;
# this makes top-level test *methods* deterministic too, independent of
# any @TestMethodOrder annotation you forgot to add.
junit.jupiter.testmethod.order.default = org.junit.jupiter.api.MethodOrderer$DisplayName

# Fail fast locally (mirrors `--fail-fast` on the console launcher); usually
# leave this false in CI so you get the full failure list in one run.
junit.jupiter.execution.timeout.default = 5 m
